####################################################################
# CI/CD Pipeline — weather-app -> EKS
#
# Triggers:
#   - Push to main (full build + deploy)
#   - Pull request to main (build + test only, no deploy)
#
# Secrets required (set in GitHub repo Settings → Secrets):
#   DOCKERHUB_USERNAME   — Docker Hub login
#   DOCKERHUB_TOKEN      — Docker Hub access token (not password)
#   AWS_ACCESS_KEY_ID    — IAM user with EKS describe + kubectl access
#   AWS_SECRET_ACCESS_KEY
#
# The IAM user (or role) needs:
#   eks:DescribeCluster        — for aws eks update-kubeconfig
#   + must be listed in aws-auth configmap as a user with
#     system:masters or a custom role that allows deployments
#     in the weather namespace.
#
# To add the GitHub Actions IAM user to aws-auth, run:
#   kubectl edit configmap aws-auth -n kube-system
# and add:
#   mapUsers: |
#     - userarn: arn:aws:iam::<account-id>:user/github-actions-deploy
#       username: github-actions-deploy
#       groups:
#         - system:masters    # or a tighter RBAC role
####################################################################

name: Build and deploy weather-app

on:
  push:
    branches: [main]
    paths:
      - 'weather-app/**'           # only re-deploy when app code changes
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'weather-app/**'

env:
  IMAGE_NAME: igior/weather-app
  CLUSTER_NAME: demo-eks
  AWS_REGION: us-east-1
  NAMESPACE: weather
  DEPLOYMENT: weather-app
  CONTAINER: weather-app

jobs:
  ####################################################################
  # Job 1 — Build, lint, test, push image
  ####################################################################
  build:
    name: Build and push
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Lint and unit tests (runs on PR too) ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: weather-app
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 

      - name: Lint with flake8
        working-directory: weather-app
        run: |
          # Stop on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues (non-blocking)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

#      - name: Run unit tests
#        working-directory: weather-app
#        run: pytest tests/ -v --tb=short
        # If you don't have a tests/ directory yet, remove this step
        # and add it once you write your first test.

      # --- Docker build (always) ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        id: meta
        run: |
          SHA_TAG="${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "Building: ${SHA_TAG}"

      - name: Build image (no push on PR)
        uses: docker/build-push-action@v5
        with:
          context: ./weather-app
          push: false          # validate build on PRs without pushing
          tags: ${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Push only on push to main ---
      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./weather-app
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ####################################################################
  # Job 2 — Deploy to EKS (main branch only)
  ####################################################################
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: Update deployment image
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT }} \
            ${{ env.CONTAINER }}=${{ env.IMAGE_TAG }} \
            -n ${{ env.NAMESPACE }}

      - name: Wait for rollout to complete
        id: rollout
        run: |
          kubectl rollout status deployment/${{ env.DEPLOYMENT }} \
            -n ${{ env.NAMESPACE }} \
            --timeout=300s

      # Rollback automatically if the rollout fails
      - name: Rollback on failure
        if: failure() && steps.rollout.conclusion == 'failure'
        run: |
          echo "Rollout failed — rolling back to previous revision"
          kubectl rollout undo deployment/${{ env.DEPLOYMENT }} \
            -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/${{ env.DEPLOYMENT }} \
            -n ${{ env.NAMESPACE }} \
            --timeout=120s

      - name: Print deployment summary
        if: success()
        run: |
          echo "======================================================"
          echo " Deployment successful"
          echo " Image: ${{ env.IMAGE_TAG }}"
          echo " Pods:"
          kubectl get pods -n ${{ env.NAMESPACE }} \
            -l app=${{ env.DEPLOYMENT }} \
            --no-headers \
            -o custom-columns='NAME:.metadata.name,STATUS:.status.phase,NODE:.spec.nodeName'
          echo "======================================================"
