####################################################################
# Ingress — AWS Application Load Balancer
#
# The aws-load-balancer-controller watches for Ingress resources
# with the annotation kubernetes.io/ingress.class: alb and
# provisions a real ALB in AWS automatically.
#
# Key annotation decisions explained inline below.
####################################################################
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-app
  namespace: demo
  annotations:
    # Tell the ALB controller to handle this Ingress
    #kubernetes.io/ingress.class: alb

    # internet-facing = public ALB. Use "internal" for VPC-only access.
    alb.ingress.kubernetes.io/scheme: internet-facing

    # ip target type registers pod IPs directly — more efficient than
    # instance mode (which goes through NodePort + kube-proxy).
    # Requires VPC CNI so pods have routable IPs, which EKS provides.
    alb.ingress.kubernetes.io/target-type: ip
    ingressclass.kubernetes.io/is-default-class: "true"

    # Health check tuning — faster than ALB defaults for a demo
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "2"

    # Tag the ALB so it's identifiable in the AWS console
    alb.ingress.kubernetes.io/tags: Environment=demo,ManagedBy=eks-alb-controller

spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-app
                port:
                  number: 80
