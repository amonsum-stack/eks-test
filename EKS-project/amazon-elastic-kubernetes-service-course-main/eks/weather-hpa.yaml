####################################################################
# Scaling policy:
#   Min replicas : 3  
#   Max replicas : 9  
#
# Scale-up triggers (either condition causes a scale-up):
#   - Average CPU    > 70%  across all pods
#   - Average Memory > 75%  across all pods
#
# Scale-up/down behaviour:
#   - Scale up   : adds up to 3 pods per 60s 
#   - Scale down : removes 1 pod per 120s   
#   - Stabilization window (scale down): 300s — must be stable for 5 min
#
# Requirements:
#   metrics-server must be running in the cluster.
#   Check: kubectl top pods -n weather
#   Install if missing:
#     kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
####################################################################

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: weather-app-hpa
  namespace: weather
  labels:
    app: weather-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: weather-app

  minReplicas: 3
  maxReplicas: 9

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0      
      policies:
        - type: Pods
          value: 3                        
          periodSeconds: 60
      selectPolicy: Max

    scaleDown:
      stabilizationWindowSeconds: 300    
      policies:
        - type: Pods
          value: 1                        
          periodSeconds: 120
      selectPolicy: Min
