####################################################################
# Overview:
#   - weather-app pods: only accept ingress from the VPC CIDR
#     (ALB hits pods directly via target-type: ip), deny all else.
#     Egress only to RDS port 5432 and DNS.
#
#   - weather-fetcher CronJob pods: no ingress at all.
#     Egress to RDS (5432), DNS, and internet (Open-Meteo API).
#
#   - weather-aggregator CronJob pods: no ingress at all.
#     Egress to RDS (5432) and DNS only.
#
# Note on ALB + NetworkPolicy:
#   With alb.ingress.kubernetes.io/target-type: ip, the ALB
#   reaches pods directly using its own IP within the VPC.
#   Since that source IP is not a pod, we cannot use podSelector
#   to restrict it. Instead we allow ingress from the VPC CIDR
#   block (172.31.0.0/16 covers the default AWS VPC range).
#   Adjust the cidr below if your VPC uses a different range.
####################################################################

####################################################################
# Default deny — all ingress and egress in the weather namespace.
# This is the baseline. Everything below carves out exceptions.
# Needed because Kubernetes defaults to allow all traffic if no policies exist.
# THERE IS NO IMPLICIT DENY IN KUBERNETES
####################################################################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: weather
spec:
  podSelector: {}       
  policyTypes:
    - Ingress
    - Egress
---
####################################################################
# weather-app — Flask deployment
#
# Ingress:
#   - Allow from VPC CIDR on port 8080 
#   - This allow us to reach the app via ALB
#
# Egress:
#   - Allow to RDS private subnets on port 5432 (Postgres)
#   - Allow DNS (UDP/TCP 53) to kube-dns
####################################################################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: weather-app-policy
  namespace: weather
spec:
  podSelector:
    matchLabels:
      app: weather-app
  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - ipBlock:
            cidr: 172.31.0.0/16
      ports:
        - protocol: TCP
          port: 8080

  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    - to: # this part allows flask to comunicate with RDS
        - ipBlock:
            cidr: 172.31.0.0/16
      ports:
        - protocol: TCP
          port: 5432
    - to: # this part allows Open-Meteo API fallback, excluding the private CIDR 
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 172.31.0.0/16
      ports:
        - protocol: TCP
          port: 443
---
####################################################################
# weather-fetcher CronJob
#
# Ingress:
#   - None (CronJob, doesn't need to receive any traffic)
#
# Egress:
#   - Allow DNS
#   - Allow to RDS on port 5432 (writes weather readings)
#   - Allow to internet on port 443 to reach Open-Meteo API and Kubernetes API
####################################################################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: weather-fetcher-policy
  namespace: weather
spec:
  podSelector:
    matchLabels:
      app: weather-fetcher
  policyTypes:
    - Ingress
    - Egress

  ingress: []   

  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    - to:
        - ipBlock:
            cidr: 172.31.0.0/16
      ports:
        - protocol: TCP
          port: 5432

    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 172.31.0.0/16       
      ports:
        - protocol: TCP
          port: 443
---
####################################################################
# weather-aggregator CronJob
#
# Ingress:
#   - None
#
# Egress:
#   - Allow DNS
#   - Allow to RDS on port 5432 only (reads + writes hourly stats)
#   - No internet access needed — only talks to the database
####################################################################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: weather-aggregator-policy
  namespace: weather
spec:
  podSelector:
    matchLabels:
      app: weather-aggregator
  policyTypes:
    - Ingress
    - Egress

  ingress: []   

  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    - to:
        - ipBlock:
            cidr: 172.31.0.0/16
      ports:
        - protocol: TCP
          port: 5432
---
####################################################################
# backup-job
#
# Ingress:
#   - None
#
# Egress:
#   - Allow DNS
#   - Allow to RDS on port 5432 (pg_dump)
#   - Allow to internet on port 443 (S3 upload via AWS CLI)
####################################################################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backup-job-policy
  namespace: weather
spec:
  podSelector:
    matchLabels:
      app: backup-job
  policyTypes:
    - Ingress
    - Egress

  ingress: []

  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    - to:
        - ipBlock:
            cidr: 172.31.0.0/16
      ports:
        - protocol: TCP
          port: 5432

    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 172.31.0.0/16 #this should be checked according to VPC CIDR
      ports:
        - protocol: TCP
          port: 443
