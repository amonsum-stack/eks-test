####################################################################
# weather-servicemonitor.yaml
#
# Tells Prometheus to scrape the weather app's /metrics endpoint.
# Apply after kube-prometheus-stack is deployed.
#
# Prometheus discovers this via the serviceMonitorSelector in
# prometheus-values.yaml (set to select all namespaces).
#
# Metrics exposed:
#   - belgrade_temperature_celsius
#   - belgrade_humidity_percent
#   - belgrade_wind_speed_ms
#   - belgrade_pressure_hpa
#   - belgrade_visibility_km
#   - flask_http_request_total (per endpoint, method, status)
#   - flask_http_request_duration_seconds (latency histogram)
####################################################################

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: weather-app
  namespace: weather
  labels:
    # This label is used by Prometheus to discover ServiceMonitors
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: weather-app
  namespaceSelector:
    matchNames:
      - weather
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
