####################################################################
# External Secrets Operator — Weather & Demo Namespaces
#
# This file replaces create-db-secret.sh
#
# Prerequisites:
#   - ESO installed via Helm in external-secrets namespace
#   - Node instance role has SecretsManagerReadWrite policy attached
#     (handled by Terraform in nodes.tf)
#
# Resources per namespace:
#   - SecretStore: tells ESO how to connect to AWS Secrets Manager
#   - ExternalSecret: tells ESO which secret to pull and what
#     Kubernetes Secret to create/sync
#
# Apply:
#   kubectl apply -f external-secrets.yaml
#
# Verify:
#   kubectl get externalsecret -n weather
#   kubectl get externalsecret -n demo
#   kubectl get secret postgres-credentials -n weather
#   kubectl get secret postgres-credentials -n demo
#
####################################################################

####################################################################
# SecretStore — weather namespace
#
# Uses node instance role credentials (no IRSA needed).
# ESO pods inherit IAM permissions from the node they run on.
####################################################################
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: weather
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        # Use node instance role — no IRSA annotation needed.
        # In production, replace with a scoped IRSA role that only
        # has GetSecretValue on the specific secret ARN.
        jwt:
          serviceAccountRef:
            name: weather-fetcher
---
####################################################################
# ExternalSecret — weather namespace
#
# Pulls eks/postgres/credentials from Secrets Manager and creates
# a postgres-credentials Kubernetes Secret in the weather namespace.
# Syncs every hour — if the password rotates in Secrets Manager,
# the k8s Secret is updated automatically within refreshInterval.
####################################################################
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: weather
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore

  target:
    name: postgres-credentials      # Name of the k8s Secret to create
    creationPolicy: Owner           # ESO owns the secret — deletes it if ExternalSecret is deleted

  data:
    - secretKey: host
      remoteRef:
        key: eks/postgres/credentials
        property: host

    - secretKey: port
      remoteRef:
        key: eks/postgres/credentials
        property: port

    - secretKey: dbname
      remoteRef:
        key: eks/postgres/credentials
        property: dbname

    - secretKey: username
      remoteRef:
        key: eks/postgres/credentials
        property: username

    - secretKey: password
      remoteRef:
        key: eks/postgres/credentials
        property: password
---
####################################################################
# SecretStore — demo namespace
####################################################################
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: demo
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: weather-fetcher
---
####################################################################
# ExternalSecret — demo namespace
#
# Same secret, different namespace. Used by db-test-job and other
# resources in the demo namespace.
####################################################################
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: demo
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore

  target:
    name: postgres-credentials
    creationPolicy: Owner

  data:
    - secretKey: host
      remoteRef:
        key: eks/postgres/credentials
        property: host

    - secretKey: port
      remoteRef:
        key: eks/postgres/credentials
        property: port

    - secretKey: dbname
      remoteRef:
        key: eks/postgres/credentials
        property: dbname

    - secretKey: username
      remoteRef:
        key: eks/postgres/credentials
        property: username

    - secretKey: password
      remoteRef:
        key: eks/postgres/credentials
        property: password
