####################################################################
# External Secrets Operator — Weather & Demo Namespaces
#
# Prerequisites:
#   - ESO installed via Helm in external-secrets namespace
#   - Node instance role has SecretsManagerReadWrite policy attached
#     (handled by Terraform in nodes.tf)
#
# Auth:
#   No IRSA or JWT auth configured — ESO uses ambient AWS credentials
#   from the node instance role. The node role has SecretsManagerReadWrite
#   attached via Terraform.
#
#   In production, replace with a scoped IRSA role that only has
#   secretsmanager:GetSecretValue on eks/postgres/* secret ARN.
#   The IRSA would probably got in eso.tf file.
#
# Resources per namespace:
#   - SecretStore: tells ESO how to connect to AWS Secrets Manager
#   - ExternalSecret: tells ESO which secret to pull and what
#     Kubernetes Secret to create/sync
#
# Apply:
#   kubectl apply -f external-secrets.yaml
#
# Verify:
#   kubectl get secretstore -n weather/demo
#   kubectl get externalsecret -n weather/demo
#   kubectl get secret postgres-credentials -n weather/demo
####################################################################

####################################################################
# SecretStore — weather namespace
#
# No auth block — roles/policies are inherited from the node instance role.
####################################################################
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: weather
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
---
####################################################################
# ExternalSecret — weather namespace
#
# Pulls eks/postgres/credentials from Secrets Manager and creates
# a postgres-credentials Kubernetes Secret in the weather namespace.
# Syncs every hour — if the password rotates in Secrets Manager,
# the k8s Secret is updated automatically within refreshInterval.
####################################################################
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: weather
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore

  target:
    name: postgres-credentials      # Name of the k8s Secret to create
    creationPolicy: Owner           # ESO owns the secret — deletes it if ExternalSecret is deleted

  data:
    - secretKey: host
      remoteRef:
        key: eks/postgres/credentials
        property: host

    - secretKey: port
      remoteRef:
        key: eks/postgres/credentials
        property: port

    - secretKey: dbname
      remoteRef:
        key: eks/postgres/credentials
        property: dbname

    - secretKey: username
      remoteRef:
        key: eks/postgres/credentials
        property: username

    - secretKey: password
      remoteRef:
        key: eks/postgres/credentials
        property: password
---
####################################################################
# SecretStore — demo namespace
#
# No auth block — uses ambient node instance role credentials.
####################################################################
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: demo
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
---
####################################################################
# ExternalSecret — demo namespace
#
# Same secret, different namespace. Used by db-test-job and other
# resources in the demo namespace.
####################################################################
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: demo
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore

  target:
    name: postgres-credentials
    creationPolicy: Owner

  data:
    - secretKey: host
      remoteRef:
        key: eks/postgres/credentials
        property: host

    - secretKey: port
      remoteRef:
        key: eks/postgres/credentials
        property: port

    - secretKey: dbname
      remoteRef:
        key: eks/postgres/credentials
        property: dbname

    - secretKey: username
      remoteRef:
        key: eks/postgres/credentials
        property: username

    - secretKey: password
      remoteRef:
        key: eks/postgres/credentials
        property: password
