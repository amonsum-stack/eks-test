####################################################################
# Grafana — Kubernetes Manifests
#
# Deploy order:
#   1. terraform apply  (creates IRSA role)
#   2. ./setup-grafana.sh  (patches role ARN and applies this file)
#
# Resources created:
#   - Namespace: monitoring
#   - ServiceAccount: grafana (IRSA-annotated)
#   - ConfigMap: grafana-datasources (CloudWatch datasource pre-wired)
#   - ConfigMap: grafana-dashboards-provider (dashboard auto-load config)
#   - ConfigMap: grafana-dashboard-eks (pre-built EKS node dashboard JSON)
#   - PersistentVolumeClaim: grafana-pvc (stores dashboards + settings)
#   - Deployment: grafana
#   - Service: grafana (ClusterIP)
#   - Ingress: grafana (ALB, internet-facing)
####################################################################

####################################################################
# Namespace
####################################################################
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/managed-by: kubectl
---
####################################################################
# ServiceAccount — annotated with IRSA role ARN
# Replace <grafana_irsa_role_arn> with Terraform output value
####################################################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    eks.amazonaws.com/role-arn: <grafana_irsa_role_arn>
---
####################################################################
# ConfigMap — CloudWatch datasource
# Grafana reads this on startup and auto-provisions the datasource.
# No manual UI setup needed.
####################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  cloudwatch.yaml: |
    apiVersion: 1
    datasources:
      - name: CloudWatch
        type: cloudwatch
        access: proxy
        uid: cloudwatch
        jsonData:
          authType: default          # Uses the IRSA credentials from the pod environment
          defaultRegion: us-east-1
          logsTimeout: 30s
        isDefault: true
        editable: true
---
####################################################################
# ConfigMap — Dashboard provider
# Tells Grafana to load dashboards from the /var/lib/grafana/dashboards
# directory automatically on startup.
####################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: EKS
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
---
####################################################################
# ConfigMap — Pre-built EKS + RDS dashboard
# Covers: Node CPU, Node status alarms, RDS CPU, RDS storage,
#         RDS connections, and Container Insights pod metrics.
####################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-eks
  namespace: monitoring
data:
  eks-overview.json: |
    {
      "title": "EKS Cluster Overview",
      "uid": "eks-overview",
      "schemaVersion": 38,
      "refresh": "1m",
      "time": { "from": "now-3h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "asg",
            "type": "textbox",
            "label": "AutoScaling Group Name",
            "current": { "value": "" },
            "description": "Paste your NodeAutoScalingGroup Terraform output here"
          },
          {
            "name": "rds",
            "type": "textbox",
            "label": "RDS Instance ID",
            "current": { "value": "eks-demo-postgres" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Node CPU Utilization (Max across ASG)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "datasource": { "type": "cloudwatch", "uid": "cloudwatch" },
              "namespace": "AWS/EC2",
              "metricName": "CPUUtilization",
              "dimensions": { "AutoScalingGroupName": ["$asg"] },
              "statistic": "Maximum",
              "period": "60",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Node Status Check Failed",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "datasource": { "type": "cloudwatch", "uid": "cloudwatch" },
              "namespace": "AWS/EC2",
              "metricName": "StatusCheckFailed",
              "dimensions": { "AutoScalingGroupName": ["$asg"] },
              "statistic": "Maximum",
              "period": "60",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "RDS CPU Utilization",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 8, "h": 8 },
          "targets": [
            {
              "datasource": { "type": "cloudwatch", "uid": "cloudwatch" },
              "namespace": "AWS/RDS",
              "metricName": "CPUUtilization",
              "dimensions": { "DBInstanceIdentifier": ["$rds"] },
              "statistic": "Average",
              "period": "60",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "RDS Free Storage Space",
          "type": "timeseries",
          "gridPos": { "x": 8, "y": 8, "w": 8, "h": 8 },
          "targets": [
            {
              "datasource": { "type": "cloudwatch", "uid": "cloudwatch" },
              "namespace": "AWS/RDS",
              "metricName": "FreeStorageSpace",
              "dimensions": { "DBInstanceIdentifier": ["$rds"] },
              "statistic": "Average",
              "period": "60",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 4294967296 },
                  { "color": "green", "value": 8589934592 }
                ]
              }
            }
          }
        },
        {
          "id": 5,
          "title": "RDS Database Connections",
          "type": "timeseries",
          "gridPos": { "x": 16, "y": 8, "w": 8, "h": 8 },
          "targets": [
            {
              "datasource": { "type": "cloudwatch", "uid": "cloudwatch" },
              "namespace": "AWS/RDS",
              "metricName": "DatabaseConnections",
              "dimensions": { "DBInstanceIdentifier": ["$rds"] },
              "statistic": "Average",
              "period": "60",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 40 },
                  { "color": "red", "value": 48 }
                ]
              }
            }
          }
        },
        {
          "id": 6,
          "title": "Container CPU Usage (ContainerInsights)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "targets": [
            {
              "datasource": { "type": "cloudwatch", "uid": "cloudwatch" },
              "namespace": "ContainerInsights",
              "metricName": "pod_cpu_utilization",
              "dimensions": { "ClusterName": ["demo-eks"] },
              "statistic": "Average",
              "period": "60",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percent" }
          }
        },
        {
          "id": 7,
          "title": "Container Memory Usage (ContainerInsights)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "targets": [
            {
              "datasource": { "type": "cloudwatch", "uid": "cloudwatch" },
              "namespace": "ContainerInsights",
              "metricName": "pod_memory_utilization",
              "dimensions": { "ClusterName": ["demo-eks"] },
              "statistic": "Average",
              "period": "60",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percent" }
          }
        }
      ]
    }
---
####################################################################
# Deployment
# Note: using emptyDir for storage — no EBS CSI driver on unmanaged
# nodes in this lab environment. Grafana state (saved dashboards,
# plugins) will be lost on pod restart, but provisioned dashboards
# and the CloudWatch datasource come back automatically from
# ConfigMaps. Good enough for a lab/demo cluster.
####################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      serviceAccountName: grafana

      # Grafana needs to write to /var/lib/grafana — run as grafana uid 472
      securityContext:
        fsGroup: 472
        runAsUser: 472
        runAsGroup: 472



      containers:
        - name: grafana
          image: grafana/grafana:10.4.2
          ports:
            - containerPort: 3000
              name: http

          env:
            # Admin credentials — change these after first login
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            # Disable telemetry in a lab environment
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            # Allow embedding (useful for dashboards in other tools)
            - name: GF_SECURITY_ALLOW_EMBEDDING
              value: "true"
            # Set the root URL to / so ALB routing works correctly
            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://%(domain)s/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "false"

          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi

      volumes:
        - name: grafana-storage
          emptyDir: {}   # No EBS CSI driver in lab — state lost on restart, ConfigMaps restore datasource/dashboards
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard-eks
---
####################################################################
# Service — ClusterIP, ALB controller targets pod IPs directly
####################################################################
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
---
####################################################################
# Ingress — provisions an internet-facing ALB
# Access Grafana at the ALB DNS after ~60-90 seconds
####################################################################
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    alb.ingress.kubernetes.io/tags: Environment=demo,ManagedBy=eks-alb-controller,App=grafana
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 80
